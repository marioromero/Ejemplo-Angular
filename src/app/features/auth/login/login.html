<div class="login-container">
  <div class="login-card">
    <h2>Bienvenido</h2>
    <p>Ingresa tus credenciales para continuar</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu@correo.com"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
        <div class="error-text" *ngIf="loginForm.get('email')?.hasError('required') && loginForm.get('email')?.touched">
          El correo es obligatorio.
        </div>
        <div class="error-text" *ngIf="loginForm.get('email')?.hasError('email') && loginForm.get('email')?.touched">
          Formato de correo inválido.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="******"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        >
        <div class="error-text" *ngIf="loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched">
          La contraseña es obligatoria.
        </div>
        <div class="error-text" *ngIf="loginForm.get('password')?.hasError('minlength') && loginForm.get('password')?.touched">
          Mínimo 6 caracteres.
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="errorMessage()">
        {{ errorMessage() }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading()">
        <span *ngIf="!isLoading()">Iniciar Sesión</span>
        <span *ngIf="isLoading()">Cargando...</span>
      </button>

    </form>
  </div>
</div>
